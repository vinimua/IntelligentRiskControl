random_seed: 2026
sentinel_version: sentinel_lgbm_demo_v1
alert_threshold_default: 0.5
fpr_constraint: 0.03
group_field: sentinel_group_id
calibration_method: PLATT
min_recall: 0.90
min_pr_auc: 0.90
lightgbm:
  class_weight: balanced
  n_estimators: 120
  learning_rate: 0.05
  num_leaves: 15
  max_depth: 5
  min_child_samples: 2
  subsample: 1.0
  colsample_bytree: 1.0
  n_jobs: 1
